name: Windows Plugin Build

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:

jobs:
  plugin-build:
    runs-on: [self-hosted, Windows, X64, Rhino8]
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build plugin
        run: ./scripts/build.ps1 -Config Release -PluginOnly

      - name: Run tests
        run: ./scripts/test.ps1 -Config Release

      - name: Package yak
        run: ./scripts/package.ps1 -Config Release -SkipBuild

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-plugin-package
          path: artifacts/package
          if-no-files-found: warn
