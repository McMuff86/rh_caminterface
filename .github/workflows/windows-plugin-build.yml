name: Windows Plugin Build

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/windows-plugin-build.yml
      - RH_caminterface.sln
      - manifest.yml
      - RhinoCNCExporter/**
      - RhinoCNCExporter.Core/**
      - RhinoCNCExporter.Tests/**
      - scripts/build.ps1
      - scripts/test.ps1
      - scripts/package.ps1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-build:
    runs-on: [self-hosted, Windows, X64, Rhino8]
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build plugin
        run: ./scripts/build.ps1 -Config Release -PluginOnly

      - name: Run tests
        run: ./scripts/test.ps1 -Config Release

      - name: Package yak
        run: ./scripts/package.ps1 -Config Release -SkipBuild

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-plugin-package
          path: artifacts/package
          if-no-files-found: warn
