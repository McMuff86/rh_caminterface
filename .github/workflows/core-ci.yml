name: Core CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
    paths:
      - .github/workflows/core-ci.yml
      - RH_caminterface.sln
      - RhinoCNCExporter.Core/**
      - RhinoCNCExporter.Tests/**
      - RhinoCNCExporter/Core/**
      - RhinoCNCExporter/BlockScanning/**
      - scripts/test.ps1
  pull_request:
    paths:
      - .github/workflows/core-ci.yml
      - RH_caminterface.sln
      - RhinoCNCExporter.Core/**
      - RhinoCNCExporter.Tests/**
      - RhinoCNCExporter/Core/**
      - RhinoCNCExporter/BlockScanning/**
      - scripts/test.ps1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build core
        run: dotnet build RhinoCNCExporter.Core/RhinoCNCExporter.Core.csproj -c Release

      - name: Build tests
        run: dotnet build RhinoCNCExporter.Tests/RhinoCNCExporter.Tests.csproj -c Release

      - name: Run tests
        run: dotnet test RhinoCNCExporter.Tests/RhinoCNCExporter.Tests.csproj -c Release --no-build --logger "trx;LogFileName=core-tests.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: artifacts/test-results
          if-no-files-found: warn
