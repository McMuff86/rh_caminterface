name: Core CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build core
        run: dotnet build RhinoCNCExporter.Core/RhinoCNCExporter.Core.csproj -c Release

      - name: Build tests
        run: dotnet build RhinoCNCExporter.Tests/RhinoCNCExporter.Tests.csproj -c Release

      - name: Run tests
        run: dotnet test RhinoCNCExporter.Tests/RhinoCNCExporter.Tests.csproj -c Release --no-build --logger "trx;LogFileName=core-tests.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: artifacts/test-results
          if-no-files-found: warn
