name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: [self-hosted, Windows, X64, Rhino8]
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build plugin
        run: ./scripts/build.ps1 -Config Release -PluginOnly

      - name: Run tests
        run: ./scripts/test.ps1 -Config Release

      - name: Package yak
        run: ./scripts/package.ps1 -Config Release -SkipBuild

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/package/*.yak
            artifacts/package/*.rhp
            artifacts/package/manifest.yml
          generate_release_notes: true
